<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Borg Orchestrator Analytics</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background: #1a1a1a; color: #fff; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 20px; }
        .card { background: #2a2a2a; border-radius: 8px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        h1 { color: #00ffcc; text-align: center; }
        h2 { font-size: 1.2rem; margin-top: 0; color: #aaa; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Persistent Analytics UI</h1>
        <div class="grid">
            <div class="card">
                <h2>Debate Consensus History</h2>
                <canvas id="consensusChart"></canvas>
            </div>
            <div class="card">
                <h2>API Token Usage by Provider</h2>
                <canvas id="usageChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        // Mock data initialization - To be wired to SQLite history DB via Go backend API
        const ctxConsensus = document.getElementById('consensusChart').getContext('2d');
        new Chart(ctxConsensus, {
            type: 'line',
            data: {
                labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
                datasets: [{
                    label: 'Average Consensus Score',
                    data: [0.85, 0.88, 0.82, 0.91, 0.95, 0.93],
                    borderColor: '#00ffcc',
                    tension: 0.1,
                    fill: true,
                    backgroundColor: 'rgba(0, 255, 204, 0.1)'
                }]
            },
            options: { scales: { y: { min: 0, max: 1 } }, responsive: true }
        });

        const ctxUsage = document.getElementById('usageChart').getContext('2d');
        new Chart(ctxUsage, {
            type: 'bar',
            data: {
                labels: ['OpenAI', 'Anthropic', 'Gemini'],
                datasets: [{
                    label: 'Tokens (Millions)',
                    data: [12, 19, 3],
                    backgroundColor: ['#10a37f', '#d97757', '#4285f4']
                }]
            },
            options: { responsive: true }
        });
    </script>
</body>
</html>
