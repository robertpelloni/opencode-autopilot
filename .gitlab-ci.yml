stages:
  - build
  - test
  - deploy

build_go_backend:
  stage: build
  image: golang:1.22
  script:
    - cd go-port
    - go build -o borg-backend ./cmd/server
  artifacts:
    paths:
      - go-port/borg-backend

test_go_backend:
  stage: test
  image: golang:1.22
  script:
    - cd go-port
    - go test ./...

test_ts_services:
  stage: test
  image: oven/bun:latest
  script:
    - bun install
    - bun run --filter '*' typecheck
    - bun run --filter './packages/*' test
